<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earth Sciences Vocabulary - Chapter 14</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background: #f1f5f9;
      color: #0f172a;
    }
    .wrap {
      max-width: 430px;
      margin: 0 auto;
      padding: 16px;
    }
    .app {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
    }
    .header {
      padding: 22px 20px 16px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .sub { font-size: 13px; color: #64748b; }
    .title { font-size: 28px; font-weight: 800; margin-top: 4px; }
    .desc { font-size: 14px; color: #64748b; margin-top: 4px; }
    .content { padding: 16px; }
    .tabs, .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button, input { font: inherit; }
    .tab, .toggle, .play, .option, .nextbtn {
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      background: #fff;
      color: #334155;
      padding: 12px 14px;
      cursor: pointer;
    }
    .tab.active, .nextbtn, .toggle.active {
      background: #0f172a;
      color: #fff;
      border-color: #0f172a;
    }
    .search {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      padding: 13px 14px;
      margin-top: 12px;
      outline: none;
      background: #fff;
    }
    .search:focus {
      border-color: #94a3b8;
      box-shadow: 0 0 0 3px rgba(148,163,184,.2);
    }
    .muted { color: #64748b; font-size: 12px; margin: 10px 2px 0; }
    .list {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 62vh;
      overflow: auto;
      padding-right: 2px;
    }
    .card {
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 14px;
      background: #fff;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }
    .num { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    .en { font-size: 22px; font-weight: 700; }
    .ipa { font-size: 14px; color: #64748b; margin-top: 2px; }
    .zh { font-size: 14px; color: #334155; margin-top: 5px; }
    .play { white-space: nowrap; padding: 10px 12px; }
    .panel {
      margin-top: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      background: #f8fafc;
      padding: 14px;
    }
    .panel-title { font-size: 13px; color: #64748b; margin-bottom: 6px; }
    .question { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
    .options { display: flex; flex-direction: column; gap: 8px; }
    .option { text-align: left; background: #fff; }
    .result {
      margin-top: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 12px 14px;
      background: #fff;
      font-size: 14px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="app">
      <div class="header">
        <div class="sub">Earth Sciences Vocabulary</div>
        <div class="title">Chapter 14</div>
        <div class="desc">手機版單字發音＋測驗</div>
      </div>

      <div class="content">
        <div class="tabs">
          <button class="tab active" id="tabVocab">單字</button>
          <button class="tab" id="tabQuiz">測驗</button>
        </div>

        <div id="vocabView">
          <input id="search" class="search" placeholder="搜尋英文、中文或編號" />
          <div class="row2" style="margin-top: 8px;">
            <button class="toggle" id="toggleZh">中文：顯示</button>
            <button class="toggle" id="toggleIpa">音標：顯示</button>
          </div>
          <div class="muted" id="countText"></div>
          <div class="list" id="list"></div>
        </div>

        <div id="quizView" class="hidden">
          <div class="row2" style="margin-top: 12px;">
            <button class="toggle active" id="modeZhToEn">中文選英文</button>
            <button class="toggle" id="modeEnToZh">英文選中文</button>
          </div>

          <div class="panel">
            <div class="panel-title">練習模式</div>
            <div class="question" id="questionText"></div>
            <div class="options" id="options"></div>
          </div>

          <button class="nextbtn" id="nextBtn" style="width: 100%; margin-top: 10px;">下一題</button>
          <div class="result hidden" id="result"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const VOCAB = [
      { id: 1, en: "bamboo", zh: "竹子", ipa: "[bæmˈbu]" },
      { id: 2, en: "blossom", zh: "開花；花", ipa: "[ˈblɑsəm]" },
      { id: 3, en: "bud", zh: "花蕾；芽；發芽", ipa: "[bʌd]" },
      { id: 4, en: "bush", zh: "灌木叢", ipa: "[bʊʃ]" },
      { id: 5, en: "coal", zh: "煤", ipa: "[kol]" },
      { id: 6, en: "crystal", zh: "水晶", ipa: "[ˈkrɪstl]" },
      { id: 7, en: "disaster", zh: "災害；不幸", ipa: "[dɪˈzæstɚ]" },
      { id: 8, en: "earthquake", zh: "地震", ipa: "[ˈɝθˌkwek]" },
      { id: 9, en: "frozen", zh: "冰凍的；凍僵的", ipa: "[ˈfrozn]" },
      { id: 10, en: "hurricane", zh: "颶風", ipa: "[ˈhɝɪˌken]" },
      { id: 11, en: "mist", zh: "霧；水汽", ipa: "[mɪst]" },
      { id: 12, en: "moonlight", zh: "月光", ipa: "[ˈmunˌlaɪt]" },
      { id: 13, en: "muddy", zh: "泥濘的；混濁的", ipa: "[ˈmʌdi]" },
      { id: 14, en: "oak", zh: "橡木樹；橡木", ipa: "[ok]" },
      { id: 15, en: "oxygen", zh: "氧氣", ipa: "[ˈɑksɪdʒən]" },
      { id: 16, en: "rainfall", zh: "降雨；降雨量", ipa: "[ˈrenˌfɔl]" },
      { id: 17, en: "ray", zh: "光線", ipa: "[re]" },
      { id: 18, en: "rotten", zh: "腐爛的", ipa: "[ˈrɑtn]" },
      { id: 19, en: "scenery", zh: "風景", ipa: "[ˈsinəri]" },
      { id: 20, en: "shade", zh: "陰涼處；遮蔽", ipa: "[ʃed]" },
      { id: 21, en: "shell", zh: "貝殼；甲殼；貝殼", ipa: "[ʃɛl]" },
      { id: 22, en: "smog", zh: "煙霧；霧霾", ipa: "[smɑɡ]" },
      { id: 23, en: "solar", zh: "太陽的", ipa: "[ˈsolɚ]" },
      { id: 24, en: "thunderstorm", zh: "雷雨", ipa: "[ˈθʌndɚˌstɔrm]" },
      { id: 25, en: "tide", zh: "潮汐", ipa: "[taɪd]" },
      { id: 26, en: "tornado", zh: "龍捲風", ipa: "[tɔrˈnedo]" },
      { id: 27, en: "tropical", zh: "熱帶的", ipa: "[ˈtrɑpɪkəl]" },
      { id: 28, en: "vapor", zh: "蒸汽；水汽", ipa: "[ˈvepɚ]" },
      { id: 29, en: "canyon", zh: "峽谷", ipa: "[ˈkænjən]" },
      { id: 30, en: "cave", zh: "洞穴", ipa: "[kev]" },
      { id: 31, en: "cliff", zh: "懸崖", ipa: "[klɪf]" },
      { id: 32, en: "drought", zh: "乾旱", ipa: "[draʊt]" },
      { id: 33, en: "iceberg", zh: "冰山", ipa: "[ˈaɪsˌbɝɡ]" },
      { id: 34, en: "landslide", zh: "山崩；塌方", ipa: "[ˈlændˌslaɪd]" },
      { id: 35, en: "mainland", zh: "大陸；本土", ipa: "[ˈmenlənd]" },
      { id: 36, en: "remote", zh: "遙遠的；偏僻的；遙控器", ipa: "[rɪˈmot]" },
      { id: 37, en: "resource", zh: "資源", ipa: "[rɪˈsɔrs]" },
      { id: 38, en: "summit", zh: "山頂；頂峰；高峰會", ipa: "[ˈsʌmɪt]" },
      { id: 39, en: "aquarium", zh: "水族館；魚缸", ipa: "[əˈkwɛriəm]" },
      { id: 40, en: "claw", zh: "爪子；抓", ipa: "[klɔ]" },
      { id: 41, en: "creature", zh: "生物", ipa: "[ˈkritʃɚ]" },
      { id: 42, en: "feather", zh: "羽毛", ipa: "[ˈfɛðɚ]" },
      { id: 43, en: "fur", zh: "毛皮", ipa: "[fɝ]" },
      { id: 44, en: "herd", zh: "畜牧群；獸群；放牧", ipa: "[hɝd]" },
      { id: 45, en: "hive", zh: "蜂巢", ipa: "[haɪv]" },
      { id: 46, en: "horn", zh: "角；號角；喇叭", ipa: "[hɔrn]" },
      { id: 47, en: "ivory", zh: "象牙", ipa: "[ˈaɪvəri]" },
      { id: 48, en: "paw", zh: "爪子；抓", ipa: "[pɔ]" },
      { id: 49, en: "pest", zh: "害蟲；有害的動物", ipa: "[pɛst]" },
      { id: 50, en: "species", zh: "物種", ipa: "[ˈspiʃiz]" },
      { id: 51, en: "web", zh: "蜘蛛網；網狀物", ipa: "[wɛb]" }
    ];

    const list = document.getElementById('list');
    const search = document.getElementById('search');
    const countText = document.getElementById('countText');
    const vocabView = document.getElementById('vocabView');
    const quizView = document.getElementById('quizView');
    const tabVocab = document.getElementById('tabVocab');
    const tabQuiz = document.getElementById('tabQuiz');
    const toggleZh = document.getElementById('toggleZh');
    const toggleIpa = document.getElementById('toggleIpa');
    const modeZhToEn = document.getElementById('modeZhToEn');
    const modeEnToZh = document.getElementById('modeEnToZh');
    const questionText = document.getElementById('questionText');
    const optionsEl = document.getElementById('options');
    const resultEl = document.getElementById('result');
    const nextBtn = document.getElementById('nextBtn');

    let showZh = true;
    let showIpa = true;
    let quizType = 'zhToEn';
    let question = null;

    function speakWord(text) {
      if (!('speechSynthesis' in window)) {
        alert('這個瀏覽器暫時不支援語音播放');
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = 0.9;
      window.speechSynthesis.speak(utterance);
    }

    function renderList() {
      const keyword = search.value.trim();
      const key = keyword.toLowerCase();

      const filtered = VOCAB.filter(v =>
        !key ||
        v.en.toLowerCase().includes(key) ||
        v.zh.includes(keyword) ||
        String(v.id).includes(keyword)
      );

      countText.textContent = `共 ${filtered.length} 個單字，點卡片右側按鈕可播放發音。`;

      list.innerHTML = filtered.map(v => `
        <div class="card">
          <div style="min-width:0;">
            <div class="num">${String(v.id).padStart(2,'0')}</div>
            <div class="en">${v.en}</div>
            ${showIpa ? `<div class="ipa">${v.ipa}</div>` : ``}
            ${showZh ? `<div class="zh">${v.zh}</div>` : ``}
          </div>
          <button class="play" onclick="speakWord('${v.en.replace(/'/g, "\\'")}')">播放</button>
        </div>
      `).join('');
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function makeQuestion() {
      const answer = VOCAB[Math.floor(Math.random() * VOCAB.length)];
      const others = shuffle(VOCAB.filter(v => v.id !== answer.id)).slice(0, 3);
      question = { answer, options: shuffle([answer, ...others]) };
      renderQuestion();
    }

    function renderQuestion() {
      resultEl.classList.add('hidden');
      resultEl.textContent = '';

      if (quizType === 'zhToEn') {
        questionText.textContent = `「${question.answer.zh}」的英文是？`;
      } else {
        questionText.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
            <span>${question.answer.en}</span>
            <button class="play" onclick="speakWord('${question.answer.en.replace(/'/g, "\\'")}')">播放</button>
          </div>
        `;
      }

      optionsEl.innerHTML = question.options.map(opt => `
        <button class="option" onclick="checkAnswer(${opt.id})">
          ${quizType === 'zhToEn' ? opt.en : opt.zh}
        </button>
      `).join('');
    }

    function checkAnswer(id) {
      const selected = question.options.find(o => o.id === id);
      resultEl.classList.remove('hidden');

      if (selected.id === question.answer.id) {
        resultEl.textContent = `答對了：${question.answer.en}`;
        speakWord(question.answer.en);
      } else {
        resultEl.textContent = `答錯了，正確答案是 ${question.answer.en}`;
      }
    }

    window.speakWord = speakWord;
    window.checkAnswer = checkAnswer;

    tabVocab.onclick = () => {
      tabVocab.classList.add('active');
      tabQuiz.classList.remove('active');
      vocabView.classList.remove('hidden');
      quizView.classList.add('hidden');
    };

    tabQuiz.onclick = () => {
      tabQuiz.classList.add('active');
      tabVocab.classList.remove('active');
      quizView.classList.remove('hidden');
      vocabView.classList.add('hidden');
      if (!question) makeQuestion();
    };

    toggleZh.onclick = () => {
      showZh = !showZh;
      toggleZh.textContent = `中文：${showZh ? '顯示' : '隱藏'}`;
      renderList();
    };

    toggleIpa.onclick = () => {
      showIpa = !showIpa;
      toggleIpa.textContent = `音標：${showIpa ? '顯示' : '隱藏'}`;
      renderList();
    };

    modeZhToEn.onclick = () => {
      quizType = 'zhToEn';
      modeZhToEn.classList.add('active');
      modeEnToZh.classList.remove('active');
      makeQuestion();
    };

    modeEnToZh.onclick = () => {
      quizType = 'enToZh';
      modeEnToZh.classList.add('active');
      modeZhToEn.classList.remove('active');
      makeQuestion();
    };

    nextBtn.onclick = () => makeQuestion();
    search.oninput = renderList;

    renderList();
  </script>
</body>
</html>
