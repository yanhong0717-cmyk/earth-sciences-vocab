<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earth Sciences Vocabulary - Chapter 14</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background: #f1f5f9;
      color: #0f172a;
    }

    .wrap {
      max-width: 430px;
      margin: 0 auto;
      padding: 16px;
    }

    .app {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
    }

    .header {
      padding: 22px 20px 16px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }

    .sub {
      font-size: 13px;
      color: #64748b;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      margin-top: 4px;
    }

    .desc {
      font-size: 14px;
      color: #64748b;
      margin-top: 4px;
    }

    .content {
      padding: 16px;
    }

    .tabs,
    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button,
    input {
      font: inherit;
    }

    .tab,
    .toggle,
    .play,
    .option,
    .nextbtn,
    .examplebtn,
    .sentencebtn {
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      background: #fff;
      color: #334155;
      padding: 12px 14px;
      cursor: pointer;
    }

    .tab.active,
    .nextbtn,
    .toggle.active {
      background: #0f172a;
      color: #fff;
      border-color: #0f172a;
    }

    .search {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      padding: 13px 14px;
      margin-top: 12px;
      outline: none;
      background: #fff;
    }

    .search:focus {
      border-color: #94a3b8;
      box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.2);
    }

    .muted {
      color: #64748b;
      font-size: 12px;
      margin: 10px 2px 0;
    }

    .list {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 62vh;
      overflow: auto;
      padding-right: 2px;
    }

    .card {
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 14px;
      background: #fff;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .word-info {
      min-width: 0;
      flex: 1;
    }

    .num {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    .en {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      word-break: break-word;
    }

    .ipa {
      font-size: 14px;
      color: #64748b;
      margin-top: 4px;
      word-break: break-word;
    }

    .zh {
      font-size: 14px;
      color: #334155;
      margin-top: 6px;
      line-height: 1.5;
    }

    .rightbtns {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
      width: 84px;
    }

    .play,
    .examplebtn,
    .sentencebtn {
      white-space: nowrap;
      padding: 10px 8px;
      font-size: 13px;
      text-align: center;
    }

    .examplebox {
      margin-top: 12px;
      border-top: 1px solid #e2e8f0;
      padding-top: 12px;
    }

    .example-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .example-content {
      flex: 1;
      min-width: 0;
    }

    .example-en {
      font-size: 14px;
      line-height: 1.7;
      color: #0f172a;
    }

    .example-zh {
      font-size: 13px;
      line-height: 1.7;
      color: #64748b;
      margin-top: 6px;
    }

    .panel {
      margin-top: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      background: #f8fafc;
      padding: 14px;
    }

    .panel-title {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 6px;
    }

    .question {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option {
      text-align: left;
      background: #fff;
    }

    .result {
      margin-top: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 12px 14px;
      background: #fff;
      font-size: 14px;
      line-height: 1.6;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 380px) {
      .rightbtns {
        width: 78px;
      }

      .en {
        font-size: 20px;
      }

      .play,
      .examplebtn,
      .sentencebtn {
        font-size: 12px;
        padding: 9px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="app">
      <div class="header">
        <div class="sub">Earth Sciences Vocabulary</div>
        <div class="title">Chapter 14</div>
        <div class="desc">手機版單字發音＋例句＋測驗</div>
      </div>

      <div class="content">
        <div class="tabs">
          <button class="tab active" id="tabVocab">單字</button>
          <button class="tab" id="tabQuiz">測驗</button>
        </div>

        <div id="vocabView">
          <input id="search" class="search" placeholder="搜尋英文、中文或編號" />
          <div class="row2" style="margin-top: 8px;">
            <button class="toggle" id="toggleZh">中文：顯示</button>
            <button class="toggle" id="toggleIpa">音標：顯示</button>
          </div>
          <div class="muted" id="countText"></div>
          <div class="list" id="list"></div>
        </div>

        <div id="quizView" class="hidden">
          <div class="row2" style="margin-top: 12px;">
            <button class="toggle active" id="modeZhToEn">中文選英文</button>
            <button class="toggle" id="modeEnToZh">英文選中文</button>
          </div>

          <div class="panel">
            <div class="panel-title">練習模式</div>
            <div class="question" id="questionText"></div>
            <div class="options" id="options"></div>
          </div>

          <button class="nextbtn" id="nextBtn" style="width: 100%; margin-top: 10px;">下一題</button>
          <div class="result hidden" id="result"></div>
        </div>
      </div>
    </div>
  </div>

 <script>
  const VOCAB = [
    { id: 1, en: "bamboo", zh: "竹子", ipa: "[bæmˈbu]", exEn: "Pandas mostly eat bamboo.", exZh: "熊貓主要吃竹子。" },
    { id: 2, en: "blossom", zh: "開花；花", ipa: "[ˈblɑsəm]", exEn: "The cherry trees blossom every spring.", exZh: "櫻桃樹每年春天會開花。" },
    { id: 3, en: "bud", zh: "花蕾；芽；發芽", ipa: "[bʌd]", exEn: "The flower bud slowly began to open.", exZh: "花蕾慢慢開始綻放。" },
    { id: 4, en: "bush", zh: "灌木叢", ipa: "[bʊʃ]", exEn: "The children were all hiding in the bush.", exZh: "孩子們全都躲在灌木叢裡。" },
    { id: 5, en: "coal", zh: "煤", ipa: "[kol]", exEn: "The man shoveled coal into the train.", exZh: "男子把煤鏟入火車。" }
  ];

  const list = document.getElementById("list");
  const search = document.getElementById("search");
  const countText = document.getElementById("countText");
  const vocabView = document.getElementById("vocabView");
  const quizView = document.getElementById("quizView");
  const tabVocab = document.getElementById("tabVocab");
  const tabQuiz = document.getElementById("tabQuiz");
  const toggleZh = document.getElementById("toggleZh");
  const toggleIpa = document.getElementById("toggleIpa");
  const modeZhToEn = document.getElementById("modeZhToEn");
  const modeEnToZh = document.getElementById("modeEnToZh");
  const questionText = document.getElementById("questionText");
  const optionsEl = document.getElementById("options");
  const resultEl = document.getElementById("result");
  const nextBtn = document.getElementById("nextBtn");

  let showZh = true;
  let showIpa = true;
  let quizType = "zhToEn";
  let question = null;
  let openExamples = new Set();
  let voices = [];
  let selectedVoice = null;

  const debugBox = document.createElement("div");
  debugBox.style.margin = "10px 0";
  debugBox.style.padding = "10px 12px";
  debugBox.style.border = "1px solid #e2e8f0";
  debugBox.style.borderRadius = "12px";
  debugBox.style.background = "#f8fafc";
  debugBox.style.fontSize = "12px";
  debugBox.style.lineHeight = "1.6";
  debugBox.innerHTML = "語音狀態：初始化中...";
  document.querySelector(".content").prepend(debugBox);

  function setDebug(msg) {
    debugBox.innerHTML = msg;
  }

  function loadVoicesNow() {
    if (!("speechSynthesis" in window)) {
      setDebug("語音狀態：此瀏覽器不支援 speechSynthesis");
      return;
    }

    voices = window.speechSynthesis.getVoices();

    selectedVoice =
      voices.find(v => /^en[-_](US|GB)/i.test(v.lang)) ||
      voices.find(v => /^en/i.test(v.lang)) ||
      null;

    setDebug(
      `語音狀態：支援 speechSynthesis<br>` +
      `voices 數量：${voices.length}<br>` +
      `已選語音：${selectedVoice ? `${selectedVoice.name} (${selectedVoice.lang})` : "未找到英文 voice"}`
    );
  }

  function unlockSpeech() {
    if (!("speechSynthesis" in window)) return;
    try {
      const warmup = new SpeechSynthesisUtterance("test");
      warmup.volume = 0;
      warmup.rate = 1;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(warmup);
      window.speechSynthesis.cancel();
    } catch (e) {}
    loadVoicesNow();
  }

  async function speakText(text, rate = 0.9) {
    if (!("speechSynthesis" in window)) {
      alert("這個瀏覽器不支援語音播放");
      return;
    }

    loadVoicesNow();

    if (!selectedVoice && voices.length === 0) {
      alert("目前沒有抓到任何語音 voice。請先重新整理一次，再按播放。");
      return;
    }

    window.speechSynthesis.cancel();
    window.speechSynthesis.resume();

    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "en-US";
    utter.rate = rate;
    utter.pitch = 1;

    if (selectedVoice) utter.voice = selectedVoice;

    utter.onstart = () => {
      setDebug(
        `語音狀態：播放中<br>` +
        `文字：${text}<br>` +
        `voice：${selectedVoice ? `${selectedVoice.name} (${selectedVoice.lang})` : "預設 voice"}`
      );
    };

    utter.onend = () => {
      setDebug(
        `語音狀態：播放完成<br>` +
        `voices 數量：${voices.length}<br>` +
        `已選語音：${selectedVoice ? `${selectedVoice.name} (${selectedVoice.lang})` : "預設 voice"}`
      );
    };

    utter.onerror = (e) => {
      setDebug(
        `語音狀態：播放失敗<br>` +
        `error：${e.error || "unknown"}<br>` +
        `voices 數量：${voices.length}<br>` +
        `已選語音：${selectedVoice ? `${selectedVoice.name} (${selectedVoice.lang})` : "未找到英文 voice"}`
      );
      alert("語音播放失敗，請把上方『語音狀態』截圖給我。");
    };

    try {
      window.speechSynthesis.speak(utter);
    } catch (e) {
      setDebug(`語音狀態：例外錯誤<br>${String(e)}`);
      alert("語音播放直接拋出錯誤，請把上方『語音狀態』截圖給我。");
    }
  }

  if ("speechSynthesis" in window) {
    loadVoicesNow();
    window.speechSynthesis.onvoiceschanged = loadVoicesNow;
  }

  document.addEventListener("click", unlockSpeech, { once: true });
  document.addEventListener("touchstart", unlockSpeech, { once: true });

  function toggleExample(id) {
    if (openExamples.has(id)) openExamples.delete(id);
    else openExamples.add(id);
    renderList();
  }

  function renderList() {
    const keyword = search.value.trim();
    const key = keyword.toLowerCase();

    const filtered = VOCAB.filter(v =>
      !key ||
      v.en.toLowerCase().includes(key) ||
      v.zh.includes(keyword) ||
      String(v.id).includes(keyword)
    );

    countText.textContent = `共 ${filtered.length} 個單字，點「例句」可展開內容。`;

    list.innerHTML = filtered.map(v => `
      <div class="card">
        <div class="card-top">
          <div class="word-info">
            <div class="num">${String(v.id).padStart(2, "0")}</div>
            <div class="en">${v.en}</div>
            ${showIpa ? `<div class="ipa">${v.ipa}</div>` : ``}
            ${showZh ? `<div class="zh">${v.zh}</div>` : ``}
          </div>

          <div class="rightbtns">
            <button class="play" onclick="speakText(${JSON.stringify(v.en)}, 0.9)">播放</button>
            <button class="examplebtn" onclick="toggleExample(${v.id})">${openExamples.has(v.id) ? "收起" : "例句"}</button>
          </div>
        </div>

        ${openExamples.has(v.id) ? `
          <div class="examplebox">
            <div class="example-head">
              <div class="example-content">
                <div class="example-en">${v.exEn}</div>
                <div class="example-zh">${v.exZh}</div>
              </div>
              <button class="sentencebtn" onclick="speakText(${JSON.stringify(v.exEn)}, 0.8)">念例句</button>
            </div>
          </div>
        ` : ``}
      </div>
    `).join("");
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function makeQuestion() {
    const answer = VOCAB[Math.floor(Math.random() * VOCAB.length)];
    const others = shuffle(VOCAB.filter(v => v.id !== answer.id)).slice(0, 3);
    question = { answer, options: shuffle([answer, ...others]) };
    renderQuestion();
  }

  function renderQuestion() {
    resultEl.classList.add("hidden");
    resultEl.textContent = "";

    if (quizType === "zhToEn") {
      questionText.textContent = `「${question.answer.zh}」的英文是？`;
    } else {
      questionText.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
          <span>${question.answer.en}</span>
          <button class="play" onclick="speakText(${JSON.stringify(question.answer.en)}, 0.9)">播放</button>
        </div>
      `;
    }

    optionsEl.innerHTML = question.options.map(opt => `
      <button class="option" onclick="checkAnswer(${opt.id})">
        ${quizType === "zhToEn" ? opt.en : opt.zh}
      </button>
    `).join("");
  }

  function checkAnswer(id) {
    const selected = question.options.find(o => o.id === id);
    resultEl.classList.remove("hidden");

    if (selected.id === question.answer.id) {
      resultEl.textContent = `答對了：${question.answer.en}`;
      speakText(question.answer.en, 0.9);
    } else {
      resultEl.textContent = `答錯了，正確答案是 ${question.answer.en}`;
    }
  }

  window.speakText = speakText;
  window.checkAnswer = checkAnswer;
  window.toggleExample = toggleExample;

  tabVocab.onclick = () => {
    tabVocab.classList.add("active");
    tabQuiz.classList.remove("active");
    vocabView.classList.remove("hidden");
    quizView.classList.add("hidden");
  };

  tabQuiz.onclick = () => {
    tabQuiz.classList.add("active");
    tabVocab.classList.remove("active");
    quizView.classList.remove("hidden");
    vocabView.classList.add("hidden");
    if (!question) makeQuestion();
  };

  toggleZh.onclick = () => {
    showZh = !showZh;
    toggleZh.textContent = `中文：${showZh ? "顯示" : "隱藏"}`;
    renderList();
  };

  toggleIpa.onclick = () => {
    showIpa = !showIpa;
    toggleIpa.textContent = `音標：${showIpa ? "顯示" : "隱藏"}`;
    renderList();
  };

  modeZhToEn.onclick = () => {
    quizType = "zhToEn";
    modeZhToEn.classList.add("active");
    modeEnToZh.classList.remove("active");
    makeQuestion();
  };

  modeEnToZh.onclick = () => {
    quizType = "enToZh";
    modeEnToZh.classList.add("active");
    modeZhToEn.classList.remove("active");
    makeQuestion();
  };

  nextBtn.onclick = () => makeQuestion();
  search.oninput = renderList;

  renderList();
</script>
</body>
</html>
